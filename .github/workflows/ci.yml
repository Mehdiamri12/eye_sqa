name: Eye Diagram CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Playwright Browsers
      run: playwright install chromium --with-deps

    - name: Run Backend & API Tests
      run: pytest tests/test_pipeline.py tests/test_api.py -v

    - name: Run Playwright Frontend Tests
      run: pytest tests/test_e2e.py -v --tracing=retain-on-failure

    - name: Upload Playwright Traces
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-failure-traces
        path: test-results/
        retention-days: 7
